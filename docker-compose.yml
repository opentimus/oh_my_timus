services:
  agent-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=siliconflow
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=https://api.siliconflow.cn/v1
      - MODEL_NAME=Pro/zai-org/GLM-5.1
      - TEMPERATURE=0.7
    restart: unless-stopped
